<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Sign Cam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="macos-window">
      <div class="window-titlebar">
        <div class="control-buttons">
          <span class="control close"></span>
          <span class="control minimize"></span>
          <span class="control zoom"></span>
        </div>
        <div class="window-title">love sign cam</div>
      </div>

      <div class="window-content">
        <div class="screen">
          <video id="video" autoplay playsinline></video>
          <canvas id="canvas"></canvas>
          <div id="status"></div>
          
          <button id="startBtn">
            <svg viewBox="0 0 24 24" class="start-icon">
              <path d="M12 8c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2m7.34 11.23L16 16.89V18c0 .55-.45 1-1 1H4c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h3.38l1.62-2.17C9.37 2.3 9.68 2 10 2h4c.32 0 .63.3.99.73L16.61 5H20c.55 0 1 .45 1 1v12c0 .32-.3.63-.73.99l.01.24H19.34z"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
